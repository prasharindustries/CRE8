<!DOCTYPE html>
<html>
<head>
  <title>CRE8</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ffcc;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      z-index: -1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid #00ffcc33;
    }

    .logo {
      font-size: 24px;
      text-shadow: 0 0 10px #00ffcc;
    }

    nav a {
      margin: 0 10px;
      cursor: pointer;
    }

    section {
      display: none;
      padding: 60px;
      text-align: center;
    }

    .active {
      display: block;
    }

    h1 {
      font-size: 45px;
      text-shadow: 0 0 20px #00ffcc;
    }

    .glass {
      border: 1px solid #00ffcc33;
      padding: 30px;
      display: inline-block;
      backdrop-filter: blur(5px);
    }

    button {
      padding: 10px 20px;
      border: 1px solid #00ffcc;
      background: transparent;
      color: #00ffcc;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00ffcc;
      color: black;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
    }

    #status {
      margin-top: 15px;
    }

    #txlink {
      color: #00ffcc;
      text-decoration: underline;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<nav>
  <div class="logo">CRE8</div>
  <div>
    <a onclick="show('home')">Home</a>
    <a onclick="show('about')">About</a>
    <a onclick="show('demo')">Demo</a>
  </div>
</nav>

<section id="home" class="active">
  <h1>CREATOR ECONOMY PROTOCOL</h1>
  <p>Automated payment splitting on blockchain</p>
  <button onclick="show('demo')">Enter System</button>
</section>

<section id="about">
  <div class="glass">
    <h2>System Overview</h2>
    <p>CRE8 enables trustless revenue distribution using smart contracts.</p>
  </div>
</section>

<section id="demo">
  <div class="glass">
    <h2>Payment Engine</h2>

    <button onclick="connect()">Connect Wallet</button>
    <p id="wallet"></p>

    <input id="creator" placeholder="Creator Address">
    <input id="collab" placeholder="Collaborator Address">
    <input id="amount" placeholder="Amount (POL)">

    <button onclick="send()">Execute Split</button>

    <div id="status"></div>
    <a id="txlink" target="_blank"></a>

  </div>
</section>

<script>
function show(id) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

let signer;

async function connect() {
  const provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  const address = await signer.getAddress();
  document.getElementById("wallet").innerText = "Connected: " + address;
}

const contractAddress = "PASTE_YOUR_CONTRACT_ADDRESS";

const abi = [
  "function distribute(address,address) payable"
];

async function send() {

  document.getElementById("status").innerText = "Processing...";

  const creator = document.getElementById("creator").value;
  const collab = document.getElementById("collab").value;
  const amount = document.getElementById("amount").value;

  const contract = new ethers.Contract(contractAddress, abi, signer);

  const tx = await contract.distribute(
    creator,
    collab,
    { value: ethers.parseEther(amount) }
  );

  document.getElementById("status").innerText = "Transaction sent...";

  await tx.wait();

  document.getElementById("status").innerText = "Success!";
  document.getElementById("txlink").href =
    "https://amoy.polygonscan.com/tx/" + tx.hash;

  document.getElementById("txlink").innerText = "View Transaction";
}
</script>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++)
  drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
